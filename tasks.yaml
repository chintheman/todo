  - id: claude-code-loops-google-meta-ads
    title: Absorb Claude Code loop patterns from Ryze AI — ad management loops with verification gates
    type: research
    domain: ai/ml
    priority: p0
    status: active
    summary: 'Deep article on using Claude Code /loop pattern for Google & Meta ads management. 8 specific loops: daily anomaly
      watch, search-term miner, budget reallocation by ROAS, creative-fatigue watch, CPA drift guard, disapproval monitor,
      audience exclusions, cross-channel digest. Key architecture: /loop command + SKILL.md + MCP connectors + state file
      + objective verification gate. State file (markdown outside conversation) records what changed and what was learned
      — survives between runs. Verification gate must be objective and able to FAIL the work (not just verify). Cost: 50K-200K
      tokens per pass. DIRECT RELEVANCE: Verification gate pattern maps to our reflexion-loop maker-checker. State file pattern
      = our cron + state architecture. The "objective gate that can fail" is a key insight for our loop engineering work.
      Even though we don''t manage Google/Meta ads, the loop architecture patterns are directly applicable.'
    captured: '2026-07-11'
    source: Ryze AI blog — get-ryze.ai (2026)
    notes: "URL: get-ryze.ai/blog/claude-code-loops-google-meta-ads Full page saved: ~/.hermes/cache/web/www.get-ryze.ai-883e0ed418.md\
      \ KEY TAKEAWAYS: - Loop = goal + stop condition on a schedule. Not a prompt you retype. - 5 building blocks: /loop,\
      \ SKILL.md, MCP, state file, gate - \"The model that proposed the change is too generous grading its own\n  homework\"\
      \ — exactly why reflexion-loop uses a separate critic\n- \"Without a real check on each pass, you do not have a loop\
      \ — you\n  have the agent agreeing with itself on repeat\"\n- Cost compounds: 50K-200K tokens/pass, maker-checker doubles\
      \ it - Start read-only, prove by hand, then automate - \"Track cost per accepted change, not tokens spent\""
    cluster: Agent Orchestration & Loops
