      \ →\n    named mechanism/tools → literal prompt detail → proof/output screenshot.\n(C) HACK LIST (6-10 slides) — contrarian\
      \ hook implying failure →\n    numbered hacks with bad-vs-good per slide → synthesis CTA.\n(D) RANT CALLOUT (4-8 slides)\
      \ — provocative claim → escalate →\n    fairness pivot → personality sign-off.\n(E) DEMO WALKTHROUGH (3-11 slides) —\
      \ product + finished output →\n    problem it solves → numbered process overview → step-by-step UI\n    screenshots\
      \ → result + positioning.\nEach framework includes exact slide count ranges, slide-by-slide templates, and example language.\
      \ Directly applicable to Creative Agency carousel pipeline — can framework-match each brief to the best structure for\
