  - id: profile-isolation-deep-dive
    title: 'Discuss: Hermes profile isolation — config-level vs dedicated bot token'
    type: discuss
    domain: ai/ml
    priority: p1
    status: active
    summary: 'Hermes profiles are config-level (same process, same bot token, swapped config/SOUL.md/skills/memories), NOT
      separate agents. The profile: field in group_topics is silently ignored on Telegram — topics always run under whatever
      profile owns the bot token (normally default). True isolation requires a dedicated bot token per profile. Key implications:
      - Memory walls work (per-profile MEMORY.md/USER.md) - Different models/toolsets per profile work - But profiles share
      process, context tax, and gateway endpoint - No process isolation = one profile''s crash takes all Worth discussing:
      is this acceptable, or do we want true agent isolation?'
    captured: 2026-07-18
    source: PA session — user research into profile architecture
    notes: "Profile isolation tiers: Config-level (current): memory/sessions/skills isolated. Process/model/tools\n  shared.\
      \ One bot token. Default across all 12+ topics.\nCredential-level (ideal): dedicated bot token per profile. Separate\
      \ gateway,\n  separate model runtime. True process isolation.\nThe profile-creation skill (v2.x) confirms: profile:\
      \ field in group_topics\n  is silently ignored on Telegram in v0.18.0.\nOpen questions: Is the current config-level\
      \ isolation sufficient? When\n  would we need true isolation? Cost/overhead of multiple bot tokens?\nCross-ref: agency-agents\
      \ router and our 26 profile roster."
    cluster: Agent Orchestration & Loops
